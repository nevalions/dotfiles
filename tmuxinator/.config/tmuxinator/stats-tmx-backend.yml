name: stats-tmx-backend
root: ~/

# Redis backs play-detection state (src/match_videos/play_detection.py).
# Started with the session; removed on `tmuxinator stop stats-tmx-backend`.
on_project_start: docker start statsboards-redis 2>/dev/null || docker run -d --name statsboards-redis -p 6379:6379 redis:7-alpine
on_project_stop: docker rm -f statsboards-redis 2>/dev/null || true

enable_pane_titles: true

windows:
  - editor:
      layout: 7084,132x61,0,0[132x51,0,0,5,132x9,0,52,6]
      panes:
        - stats-backend:
            - cd ~/code/statsboard/statsboards-backend/
            - . ./venv/bin/activate
            - v
        - stats-backend-terminal:
            - cd ~/code/statsboard/statsboards-backend/
            - . ./venv/bin/activate
            # exec replaces the shell so uvicorn's reload supervisor IS the pane
            # process. Ctrl-C reaches it directly, and there is no shell left to
            # adopt an orphaned reload worker as a stale background process.
            - exec python -m src.runserver
